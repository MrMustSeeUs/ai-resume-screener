# =============================================================================
# AI Resume Screener — .github/workflows/ci.yml
# GitHub Actions CI/CD pipeline.
#
# CI = Continuous Integration: automatically run tests on every push
# CD = Continuous Deployment: automatically deploy when tests pass
#
# This pipeline runs every time you push code to the 'main' branch.
# =============================================================================

name: CI/CD Pipeline

# Trigger: run this pipeline on every push to the main branch
# Also runs on pull requests to catch bugs before merging
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Fix: opt into Node.js 24 now to resolve deprecation warning
# GitHub is retiring Node.js 20 from Actions on September 16th, 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest   # GitHub provides a free Ubuntu virtual machine

    steps:
      # Step 1: Check out the code from GitHub onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Cache pip packages so subsequent runs are faster
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # Step 4: Install all dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 5: Run pytest (our test suite lives in /tests)
      # The ANTHROPIC_API_KEY is injected from GitHub Secrets (never hardcoded)
      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -v

  # ── Job 2: Docker build check ────────────────────────────────────────────────
  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: test   # Only runs if the 'test' job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Try to build the Docker image — confirms Dockerfile has no errors
      - name: Build Docker image
        run: docker build -t ai-resume-screener:test .

  # ── Job 3: Deploy to Render ──────────────────────────────────────────────────
  # NOTE: Render can also auto-deploy from GitHub pushes directly.
  # This job is a placeholder — in Step 5 we'll wire up Render deployment.
